version: '3'

vars:
  PROJECT_ROOT:
    sh: pwd
  GOBIN: '{{.PROJECT_ROOT}}/bin'
  GOLANGCI_LINT_LOCAL_BINARY: '{{.GOBIN}}/golangci-lint'
  REQUIRED_GOLANGCI_LINT_VERSION:
    sh: cat .golangci.version 2>/dev/null || echo "2.12.2"
  GOLANGCI_LINT_BINARY:
    sh: |
      required="$(cat .golangci.version 2>/dev/null || echo "2.12.2")"
      for candidate in "$(command -v golangci-lint 2>/dev/null || true)" "{{.GOLANGCI_LINT_LOCAL_BINARY}}"; do
        [ -n "$candidate" ] || continue
        [ -x "$candidate" ] || continue
        version="$("$candidate" version --format short 2>/dev/null || "$candidate" version --short 2>/dev/null || true)"
        if [ "$version" = "$required" ]; then
          echo "$candidate"
          exit 0
        fi
      done
      echo "{{.GOLANGCI_LINT_LOCAL_BINARY}}"
  GOLANGCI_LINT_VERSION:
    sh: |
      {{.GOLANGCI_LINT_BINARY}} version --format short 2>/dev/null ||
      {{.GOLANGCI_LINT_BINARY}} version --short 2>/dev/null ||
      echo "not-installed"

env:
  GOBIN: '{{.GOBIN}}'

tasks:
  default:
    desc: Run lint and test
    cmds:
      - task: lint
      - task: test

  help:
    desc: Show this help message
    cmds:
      - echo "MessageFormat Go Library"
      - echo "Available targets:"
      - task --list
    silent: true

  clean:
    desc: Clean build artifacts and caches
    cmds:
      - echo "Cleaning build artifacts..."
      - rm -rf {{.GOBIN}}
      - go clean -cache -testcache || true

  submodules:
    desc: Initialize the official MessageFormat fixture
    cmds:
      - echo "Initializing official MessageFormat fixtures..."
      - git submodule update --init --depth 1 tests/messageformat-wg

  require-official-fixtures:
    internal: true
    preconditions:
      - sh: test -d tests/messageformat-wg/test/tests
        msg: Official fixtures are missing; run 'task submodules' first

  deps:
    desc: Download Go module dependencies
    cmds:
      - echo "Downloading dependencies..."
      - go mod download
      - go mod tidy


  deps:update:
    desc: Update dependencies for the root module and any nested modules
    cmds:
      - |
        set -e
        echo "Updating dependencies..."
        MODULES=". $(find . -mindepth 2 -name go.mod \
          -not -path '*/vendor/*' -not -path '*/.*' \
          -exec dirname {} \; | sort)"
        for dir in $MODULES; do
          echo "==> $dir"
          (
            cd "$dir"
            replaced=$(awk '
              /^replace[[:space:]]+[^(]/ { print $2 }
              /^replace[[:space:]]*\(/ { f=1; next }
              f && /^\)/ { f=0; next }
              f && /=>/ { print $1 }
            ' go.mod)
            deps=$(awk '
              /^require[[:space:]]+[^(]/ { print $2 }
              /^require[[:space:]]*\(/ { f=1; next }
              f && /^\)/ { f=0; next }
              f && !/\/\/ indirect/ && NF >= 2 { print $1 }
            ' go.mod | while read -r dep; do
              echo "$replaced" | grep -qxF "$dep" || echo "$dep"
            done | tr '\n' ' ')
            if [ -n "$deps" ]; then
              go get -u $deps
            fi
            go mod tidy
          )
        done
        if [ -f go.work ]; then
          echo "==> go work sync"
          go work sync
        fi


  deps:submodules:
    desc: Initialize required nested submodules
    cmds:
      - task: submodules
  test:
    desc: Run all tests with race detection
    cmds:
      - task: test:root
      - task: test:mf1

  test:root:
    desc: Run root module tests with race detection
    deps:
      - require-official-fixtures
    cmds:
      - echo "Running root module tests..."
      - go test -race -count=1 ./...

  test:mf1:
    desc: Run MF1 module tests with race detection
    dir: mf1
    cmds:
      - echo "Running MF1 module tests..."
      - go test -race -count=1 ./...

  test-v2:
    desc: Run package tests and the official test suite
    deps:
      - require-official-fixtures
    cmds:
      - echo "Running package and official tests..."
      - go test -race -count=1 ./pkg/... ./internal/... ./tests/... .

  test-official:
    desc: Run official MessageFormat 2.0 test suite only
    deps:
      - require-official-fixtures
    cmds:
      - echo "Running official test suite..."
      - go test -race -count=1 ./tests/

  test-coverage:
    desc: Run tests with coverage report
    deps:
      - require-official-fixtures
    cmds:
      - echo "Running tests with coverage..."
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  test-verbose:
    desc: Run tests with verbose output
    deps:
      - require-official-fixtures
    cmds:
      - echo "Running tests with verbose output..."
      - go test -race -v ./...

  bench:
    desc: Run benchmarks
    cmds:
      - echo "Running benchmarks..."
      - go test -race -bench=. -benchmem ./...

  lint:
    desc: Run all linters
    cmds:
      - task: lint:root
      - task: lint:mf1

  lint:root:
    desc: Run root module lint and tidy checks
    cmds:
      - task: tidy-lint:root
      - task: golangci-lint:root

  lint:mf1:
    desc: Run MF1 module lint and tidy checks
    cmds:
      - task: tidy-lint:mf1
      - task: golangci-lint:mf1

  install-golangci-lint:
    desc: Install golangci-lint with the required version
    cmds:
      - mkdir -p "{{.GOBIN}}"
      - |
        if [ "{{.GOLANGCI_LINT_VERSION}}" != "{{.REQUIRED_GOLANGCI_LINT_VERSION}}" ]; then
          echo "Installing golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}}..."
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b "{{.GOBIN}}" v{{.REQUIRED_GOLANGCI_LINT_VERSION}}
          echo "golangci-lint v{{.REQUIRED_GOLANGCI_LINT_VERSION}} installed successfully"
        fi
    status:
      - test "{{.GOLANGCI_LINT_VERSION}}" = "{{.REQUIRED_GOLANGCI_LINT_VERSION}}"

  golangci-lint:root:
    internal: true
    deps:
      - install-golangci-lint
    cmds:
      - '{{.GOLANGCI_LINT_BINARY}} version'
      - echo "Running root module golangci-lint..."
      - '{{.GOLANGCI_LINT_BINARY}} run --timeout=30m --concurrency=1 --allow-parallel-runners --path-prefix=.'

  golangci-lint:mf1:
    internal: true
    deps:
      - install-golangci-lint
    dir: mf1
    cmds:
      - '{{.GOLANGCI_LINT_BINARY}} version'
      - echo "Running MF1 module golangci-lint..."
      - '{{.GOLANGCI_LINT_BINARY}} run --config=../.golangci.yml --timeout=30m --concurrency=1 --allow-parallel-runners --path-prefix=.'

  tidy-lint:
    desc: Check both module graphs are tidy
    cmds:
      - task: tidy-lint:root
      - task: tidy-lint:mf1

  tidy-lint:root:
    desc: Check the root module graph is tidy
    cmds:
      - echo "Checking root go.mod and go.sum are tidy..."
      - go mod tidy -diff

  tidy-lint:mf1:
    desc: Check the MF1 module graph is tidy
    dir: mf1
    cmds:
      - echo "Checking MF1 go.mod and go.sum are tidy..."
      - go mod tidy -diff

  yamllint:
    desc: Run yamllint
    cmds:
      - yamllint -s .

  vuln:
    desc: Run govulncheck for both modules
    cmds:
      - task: vuln:root
      - task: vuln:mf1

  vuln:root:
    desc: Run govulncheck for the root module
    cmds:
      - govulncheck ./...

  vuln:mf1:
    desc: Run govulncheck for the MF1 module
    dir: mf1
    cmds:
      - govulncheck ./...

  fmt:
    desc: Format Go code
    deps:
      - install-golangci-lint
    cmds:
      - echo "Formatting Go code..."
      - '{{.GOLANGCI_LINT_BINARY}} fmt ./...'

  vet:
    desc: Run go vet for both modules
    cmds:
      - task: vet:root
      - task: vet:mf1

  vet:root:
    desc: Run go vet for the root module
    cmds:
      - echo "Running root module go vet..."
      - go vet ./...

  vet:mf1:
    desc: Run go vet for the MF1 module
    dir: mf1
    cmds:
      - echo "Running MF1 module go vet..."
      - go vet ./...

  verify:
    desc: Run read-only verification for both modules
    cmds:
      - task: vet
      - task: lint
      - task: test
      - task: vuln
      - echo "All verification steps completed successfully ✅"

  examples:
    desc: Run all examples
    cmds:
      - echo "Running examples..."
      - cd examples/basic && go run main.go
      - cd examples/advanced && go run main.go
      - cd examples/custom-functions && go run main.go
      - cd examples/pluralization && go run main.go
      - cd mf1/examples/basic && go run main.go
      - cd mf1/examples/ecommerce && go run main.go
      - cd mf1/examples/multilingual && go run main.go
      - cd mf1/examples/performance && go run main.go
      - echo ""
      - echo "All examples completed successfully"
