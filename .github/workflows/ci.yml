name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOTOOLCHAIN: local

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOWORK: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out official fixtures
        run: git submodule update --init --depth 1 tests/messageformat-wg

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            mf1/go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: task test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOWORK: "off"
      GOGC: "50"
      GOMEMLIMIT: 4GiB
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        # Do NOT initialize submodules

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            mf1/go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run vet checks
        run: task vet

      - name: Check module graphs are tidy
        run: task tidy-lint

      - name: Read golangci-lint version
        id: golangci
        run: echo "version=v$(cat .golangci.version)" >> "$GITHUB_OUTPUT"

      - name: Run root golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci.outputs.version }}
          args: --timeout=30m --concurrency=1 --path-prefix=.

      - name: Run MF1 golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.golangci.outputs.version }}
          working-directory: mf1
          args: --config=../.golangci.yml --timeout=30m --concurrency=1 --path-prefix=.

  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOWORK: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            mf1/go.sum

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run vulnerability checks
        run: task vuln
