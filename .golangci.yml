# golangci-lint v2 — canonical config for this ecosystem.
# Owner: golangci-linting skill. Do not fork or override per-project
# without amending the skill.
version: "2"

run:
  timeout: 5m
  # Match the module's go.mod `go` directive when this differs from the
  # toolchain default.
  go: "1.26.2"
  tests: true

linters:
  # `standard` = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    # --- Error vocabulary ----------------------------------------------
    - errname
    - errorlint
    - nilerr
    # --- Switch totality -----------------------------------------------
    - exhaustive
    # --- Code quality --------------------------------------------------
    - gocritic
    - revive
    - misspell
    - nakedret
    - whitespace
    - prealloc
    # --- Resource & context safety -------------------------------------
    - bodyclose
    - noctx
    # --- Security ------------------------------------------------------
    - gosec
    # --- Suppression hygiene -------------------------------------------
    - nolintlint

  settings:
    exhaustive:
      default-signifies-exhaustive: true

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam
        - rangeValCopy

    revive:
      rules:
        - name: if-return
        - name: error-return
        - name: error-naming
        - name: error-strings
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code

    nakedret:
      max-func-lines: 30

    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false

  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - gosec
          - noctx
          - bodyclose
          - errname
          - revive
      - path: examples/
        linters:
          - revive
          - gosec
          - staticcheck
      - path: internal/
        linters:
          - revive
          - gosec
          - staticcheck
      - path: tests/
        linters:
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
